<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
<title>Matrix — priority by position</title>

<meta name="description" content="Plot tasks on an importance / urgency matrix. Private, on-device, no account." />
<meta name="theme-color" content="#f5f2ea" />

<!-- PWA / iOS standalone -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Matrix" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

<!-- Fonts (falls back to system mono/serif offline) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   BICHRADIO — LIGHT  (tokens + components, inlined)
   ============================================================ */
:root{
  --bg:#f5f2ea; --bg-elevated:#efe9da; --surface:#fbf9f3;
  --border:rgba(38,33,26,.12); --border-accent:rgba(160,120,50,.30);
  --text:#26211a; --muted:rgba(38,33,26,.55); --subtle:rgba(38,33,26,.34);
  --accent:#c8a96e; --accent-ink:#8a6a2c; --accent-dim:rgba(200,169,110,.18);
  --red:#c0392b; --red-dot:#d14545;
  --font-mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --font-serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --space-xs:4px; --space-sm:8px; --space-md:16px; --space-lg:24px; --space-xl:28px;
  --radius-sm:2px; --radius-md:10px; --radius-full:50%;
  --ease:.2s ease; --ease-spring:.4s cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font-mono);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none;}
body{ -webkit-tap-highlight-color:transparent; }

.grain::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");}

.text-display{font-family:var(--font-serif);font-style:italic;color:var(--accent-ink);letter-spacing:.04em}
.text-label{font-family:var(--font-mono);font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.text-caption{font-size:.65rem;letter-spacing:.1em;color:var(--muted)}
.text-muted{color:var(--muted)} .text-subtle{color:var(--subtle)} .text-accent{color:var(--accent-ink)}

.btn{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  padding:var(--space-sm) 18px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--ease);min-height:44px}
.btn:hover{border-color:var(--accent);color:var(--accent-ink)}
.btn:active{transform:scale(.96)}
.btn.active{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-dim)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#1f1a10}
.btn-accent:hover{background:var(--accent-ink);border-color:var(--accent-ink);color:#fff}
.btn-danger{color:var(--red);border-color:rgba(192,57,43,.25)}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:rgba(192,57,43,.07)}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--muted);
  transition:color var(--ease),transform .15s;padding:var(--space-sm);
  display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
.btn-icon:hover{color:var(--text)} .btn-icon:active{transform:scale(.95)}

.tag{display:inline-flex;align-items:center;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--border);padding:3px 10px;border-radius:var(--radius-sm)}
.tag.tag--accent{color:var(--accent-ink);border-color:var(--border-accent);background:var(--accent-dim)}

:focus-visible{outline:2px solid var(--accent-ink);outline-offset:2px}

@keyframes slideup{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.18)}100%{transform:translate(-50%,-50%) scale(1)}}
.animate-fadein{animation:fadein .6s ease both}

/* ============================================================
   APP LAYOUT
   ============================================================ */
.app-shell{height:100dvh;display:flex;flex-direction:column;
  padding-top:max(env(safe-area-inset-top,0px),0px);
  padding-bottom:max(env(safe-area-inset-bottom,0px),0px);
  padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);}

/* Header — informational only, sits clear of the status bar */
.top{display:flex;align-items:flex-start;justify-content:space-between;
  padding:var(--space-md) var(--space-lg) var(--space-sm);flex-shrink:0}
.brand{display:flex;flex-direction:column;gap:2px}
.brand h1{font-family:var(--font-serif);font-style:italic;color:var(--accent-ink);
  font-size:1.5rem;font-weight:500;line-height:1;letter-spacing:.02em}
.id-chip{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;white-space:nowrap}
.id-chip b{color:var(--accent-ink);font-weight:500;letter-spacing:.1em}

/* Stage — centers the matrix in the remaining space */
.stage{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;min-height:0;padding:var(--space-sm) var(--space-lg)}

/* ── THE MATRIX (signature element) ───────────────────────── */
.matrix-wrap{position:relative;width:min(86vw,58vh,520px);height:min(86vw,58vh,520px);}
.matrix{position:absolute;inset:0;touch-action:none;cursor:crosshair;
  border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);
  box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 12px 40px rgba(38,33,26,.06);}
/* faint quadrant tints — urgent+important warms toward gold */
.matrix::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;
  background:
    radial-gradient(120% 120% at 100% 0%, var(--accent-dim) 0%, transparent 42%);}
/* axes */
.axis{position:absolute;background:var(--accent);opacity:.7;pointer-events:none}
.axis-x{left:0;right:0;top:50%;height:1px;transform:translateY(-.5px)}
.axis-y{top:0;bottom:0;left:50%;width:1px;transform:translateX(-.5px)}
.axis-cap{position:absolute;width:5px;height:5px;background:var(--accent);
  border-radius:var(--radius-full);pointer-events:none}
.cap-r{top:50%;right:-2px;transform:translate(0,-50%)}
.cap-t{top:-2px;left:50%;transform:translate(-50%,0)}
/* axis end-labels */
.axis-label{position:absolute;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--subtle);pointer-events:none;white-space:nowrap}
.al-top{top:6px;left:50%;transform:translateX(-50%)}
.al-bottom{bottom:6px;left:50%;transform:translateX(-50%)}
.al-left{left:8px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl}
.al-right{right:8px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl}
/* quadrant names — quiet serif */
.quad{position:absolute;font-family:var(--font-serif);font-style:italic;
  color:var(--subtle);font-size:.8rem;pointer-events:none;letter-spacing:.02em}
.q-do{top:10%;right:8%} .q-plan{top:10%;left:8%}
.q-deleg{bottom:10%;right:8%} .q-drop{bottom:10%;left:8%}

/* dots */
.dot{position:absolute;width:16px;height:16px;border-radius:var(--radius-full);
  background:var(--accent);border:1.5px solid var(--accent-ink);
  transform:translate(-50%,-50%);cursor:grab;touch-action:none;z-index:5;
  box-shadow:0 1px 4px rgba(38,33,26,.25);animation:pop .3s var(--ease-spring) both}
.dot:active{cursor:grabbing}
.dot.dragging{z-index:20;box-shadow:0 4px 14px rgba(38,33,26,.3)}
.dot.done{background:var(--bg);border-color:var(--muted);box-shadow:none}
.dot-label{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:.62rem;color:var(--text);background:var(--bg);
  padding:1px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);
  white-space:nowrap;max-width:42vw;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.dot.flip-left .dot-label{left:auto;right:14px}
.dot.done .dot-label{color:var(--muted);text-decoration:line-through}

/* empty hint */
.hint{position:absolute;left:50%;bottom:-30px;transform:translateX(-50%);
  font-size:.62rem;letter-spacing:.12em;color:var(--subtle);text-align:center;
  text-transform:uppercase;pointer-events:none;width:100%}

/* ── DOCK (bottom — the only persistent controls, thumb-reachable) ── */
.dock{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  gap:var(--space-md);padding:var(--space-md) var(--space-lg) var(--space-lg);}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.seg .btn{border:none;border-radius:0;background:transparent;min-width:96px}
.seg .btn+.btn{border-left:1px solid var(--border)}
.count{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.count b{color:var(--accent-ink);font-weight:500}

/* ── LIST VIEW (overlay) ─────────────────────────────────── */
.list-view{position:absolute;inset:0;background:var(--bg);z-index:8;display:none;
  flex-direction:column;animation:fadein .25s ease both}
.list-view.show{display:flex}
.list-scroll{flex:1;overflow-y:auto;padding:var(--space-sm) var(--space-lg) var(--space-2xl);-webkit-overflow-scrolling:touch}
.group-head{display:flex;align-items:baseline;gap:10px;margin:var(--space-lg) 0 var(--space-sm)}
.group-head .swatch{width:9px;height:9px;border-radius:50%;background:var(--accent);border:1px solid var(--accent-ink);flex-shrink:0}
.group-head h3{font-family:var(--font-serif);font-style:italic;font-size:1.05rem;color:var(--text);font-weight:500}
.group-head span{font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--subtle)}
.row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:6px;cursor:pointer;color:var(--text);
  font-family:var(--font-mono);font-size:.8rem;transition:border-color var(--ease)}
.row:hover{border-color:var(--border-accent)}
.row .marker{width:10px;height:10px;border-radius:50%;background:var(--accent);border:1px solid var(--accent-ink);flex-shrink:0}
.row.done .marker{background:var(--bg);border-color:var(--muted)}
.row.done .row-label{color:var(--muted);text-decoration:line-through}
.row-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-meta{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle)}
.empty{padding:var(--space-2xl) var(--space-md);text-align:center;color:var(--subtle);font-size:.75rem;letter-spacing:.06em;line-height:2}

/* ── SHEET (edit / add) ──────────────────────────────────── */
.scrim{position:fixed;inset:0;background:rgba(38,33,26,.18);z-index:998;display:none}
.scrim.show{display:block}
.sheet{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:var(--bg-elevated);border-top:1px solid var(--border-accent);
  box-shadow:0 -8px 30px rgba(38,33,26,.1);
  padding:var(--space-md) var(--space-lg);
  padding-bottom:max(var(--space-lg),calc(env(safe-area-inset-bottom,0px) + var(--space-md)));}
.sheet.visible{display:flex;flex-direction:column;gap:var(--space-md);animation:slideup var(--ease-spring) both}
.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-md)}
.sheet-quad{display:flex;flex-direction:column;gap:2px}
.sheet-quad .name{font-family:var(--font-serif);font-style:italic;font-size:1.15rem;color:var(--accent-ink)}
.sheet-quad .desc{font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.task-input{width:100%;font-family:var(--font-mono);font-size:1rem;color:var(--text);
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;outline:none;transition:border-color var(--ease)}
.task-input:focus{border-color:var(--accent)}
.task-input::placeholder{color:var(--subtle)}
.sheet-actions{display:flex;gap:var(--space-sm);align-items:center}
.sheet-actions .grow{flex:1}
.done-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.6rem;
  letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;min-height:44px;background:var(--surface)}
.done-toggle.on{color:var(--accent-ink);border-color:var(--accent);background:var(--accent-dim)}
.done-toggle .box{width:14px;height:14px;border:1.5px solid currentColor;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}
@media (max-width:360px){
  .seg .btn{min-width:78px;padding:var(--space-sm) 10px}
  .brand h1{font-size:1.3rem}
}
</style>
</head>
<body class="grain">
<div class="app-shell">

  <header class="top">
    <div class="brand">
      <h1>Matrix</h1>
      <span class="text-label">priority by position</span>
    </div>
    <div class="id-chip">id <b id="userId">—</b></div>
  </header>

  <main class="stage">
    <div class="matrix-wrap">
      <div class="matrix" id="matrix" role="application" aria-label="Importance and urgency matrix. Tap an empty area to add a task.">
        <div class="axis axis-x"></div>
        <div class="axis axis-y"></div>
        <span class="axis-cap cap-r"></span>
        <span class="axis-cap cap-t"></span>

        <span class="axis-label al-top">important</span>
        <span class="axis-label al-bottom">not important</span>
        <span class="axis-label al-left">not urgent</span>
        <span class="axis-label al-right">urgent</span>

        <span class="quad q-plan">plan</span>
        <span class="quad q-do">do</span>
        <span class="quad q-drop">drop</span>
        <span class="quad q-deleg">delegate</span>

        <!-- dots injected here -->
      </div>
      <div class="hint" id="hint">tap anywhere to drop a task</div>
    </div>

    <!-- LIST overlay lives inside the stage so it covers only the canvas -->
    <section class="list-view" id="listView" aria-hidden="true">
      <div class="list-scroll" id="listScroll"></div>
    </section>
  </main>

  <nav class="dock">
    <div class="seg" role="tablist" aria-label="View">
      <button class="btn active" id="tabMatrix" role="tab" aria-selected="true">Matrix</button>
      <button class="btn" id="tabList" role="tab" aria-selected="false">List</button>
    </div>
    <span class="count"><b id="countNum">0</b> tasks</span>
  </nav>
</div>

<!-- edit / add sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Task">
  <div class="sheet-head">
    <div class="sheet-quad">
      <span class="name" id="quadName">Do</span>
      <span class="desc" id="quadDesc">important & urgent</span>
    </div>
    <button class="done-toggle" id="doneToggle"><span class="box" id="doneBox"></span><span id="doneText">mark done</span></button>
  </div>
  <input class="task-input" id="taskInput" type="text" maxlength="120" placeholder="What's the task?" autocomplete="off" />
  <div class="sheet-actions">
    <button class="btn btn-danger" id="deleteBtn">Delete</button>
    <span class="grow"></span>
    <button class="btn" id="cancelBtn">Cancel</button>
    <button class="btn btn-accent" id="saveBtn">Save</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   Store — the swappable persistence interface.
   MVP backend: localStorage (falls back to in-memory if blocked,
   e.g. inside a sandboxed preview frame).
   For option 4 later: replace load()/save() internals with
   IndexedDB + WebCrypto. App code below never changes.
   ============================================================ */
const Store = (() => {
  const KEY = "matrix.state.v1";
  let backend = "memory";
  let mem = null;
  try {
    const t = "__matrix_probe__";
    localStorage.setItem(t, "1");
    localStorage.removeItem(t);
    backend = "local";
  } catch (_) { backend = "memory"; }

  return {
    backend,
    load() {
      if (backend === "local") {
        try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; }
        catch (_) { return null; }
      }
      return mem;
    },
    save(state) {
      if (backend === "local") {
        try { localStorage.setItem(KEY, JSON.stringify(state)); return true; }
        catch (_) { return false; }
      }
      mem = state; return true;
    }
  };
})();

/* ============================================================
   State
   ============================================================ */
const clamp = (n, lo, hi) => Math.min(hi, Math.max(lo, n));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const genUserId = () => String(Math.floor(10000 + Math.random() * 90000));

let state = Store.load();
if (!state || !Array.isArray(state.tasks)) {
  state = { v: 1, userId: genUserId(), tasks: [] };
}
if (!state.userId) state.userId = genUserId();
persist();

function persist() { Store.save(state); }

/* quadrant from normalized x (urgency 0..1) & y (importance 0..1) */
const QUADS = {
  do:     { name: "Do",       desc: "important & urgent" },
  plan:   { name: "Plan",     desc: "important, not urgent" },
  delegate:{ name: "Delegate", desc: "urgent, not important" },
  drop:   { name: "Drop",     desc: "not urgent or important" }
};
function quadKey(x, y) {
  const imp = y >= 0.5, urg = x >= 0.5;
  if (imp && urg) return "do";
  if (imp && !urg) return "plan";
  if (!imp && urg) return "delegate";
  return "drop";
}

/* ============================================================
   Elements
   ============================================================ */
const matrix   = document.getElementById("matrix");
const hint     = document.getElementById("hint");
const userIdEl = document.getElementById("userId");
const countEl  = document.getElementById("countNum");
const listView = document.getElementById("listView");
const listScroll = document.getElementById("listScroll");
const tabMatrix= document.getElementById("tabMatrix");
const tabList  = document.getElementById("tabList");

const scrim    = document.getElementById("scrim");
const sheet    = document.getElementById("sheet");
const taskInput= document.getElementById("taskInput");
const quadName = document.getElementById("quadName");
const quadDesc = document.getElementById("quadDesc");
const doneToggle = document.getElementById("doneToggle");
const doneBox  = document.getElementById("doneBox");
const doneText = document.getElementById("doneText");
const deleteBtn= document.getElementById("deleteBtn");
const cancelBtn= document.getElementById("cancelBtn");
const saveBtn  = document.getElementById("saveBtn");

userIdEl.textContent = state.userId;

/* ============================================================
   Sheet (add / edit) state machine
   ============================================================ */
let editingId = null;     // task being edited
let isNew = false;        // created this open; discard if left blank/cancelled

function openSheet(id, opts = {}) {
  editingId = id;
  isNew = !!opts.isNew;
  const t = getTask(id);
  if (!t) return;
  const q = QUADS[quadKey(t.x, t.y)];
  quadName.textContent = q.name;
  quadDesc.textContent = q.desc;
  taskInput.value = t.label || "";
  setDoneUI(t.done);
  scrim.classList.add("show");
  sheet.classList.add("visible");
  // focus after the slide-up so mobile keyboards behave
  setTimeout(() => { taskInput.focus(); if (!isNew) taskInput.select(); }, 60);
}

function closeSheet(commit = true) {
  // if a freshly-created task was left blank, drop it
  if (isNew && commit === false) {
    const t = getTask(editingId);
    if (t && !t.label.trim()) removeTask(editingId);
  }
  sheet.classList.remove("visible");
  scrim.classList.remove("show");
  editingId = null; isNew = false;
  render();
}

function setDoneUI(done) {
  doneToggle.classList.toggle("on", done);
  doneBox.textContent = done ? "✓" : "";
  doneText.textContent = done ? "done" : "mark done";
}

function saveSheet() {
  const t = getTask(editingId);
  if (!t) return closeSheet();
  const label = taskInput.value.trim();
  if (!label) {
    // empty label → treat as discard
    removeTask(editingId);
    sheet.classList.remove("visible");
    scrim.classList.remove("show");
    editingId = null; isNew = false;
    render();
    return;
  }
  t.label = label;
  t.updatedAt = Date.now();
  isNew = false;
  persist();
  sheet.classList.remove("visible");
  scrim.classList.remove("show");
  editingId = null;
  render();
}

doneToggle.addEventListener("click", () => {
  const t = getTask(editingId);
  if (!t) return;
  t.done = !t.done;
  t.updatedAt = Date.now();
  setDoneUI(t.done);
  persist();
  render();
});
deleteBtn.addEventListener("click", () => { if (editingId) removeTask(editingId); closeSheet(); });
cancelBtn.addEventListener("click", () => closeSheet(false));
saveBtn.addEventListener("click", saveSheet);
scrim.addEventListener("click", () => closeSheet(false));
taskInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); saveSheet(); }
  if (e.key === "Escape") { e.preventDefault(); closeSheet(false); }
});

/* ============================================================
   Task helpers
   ============================================================ */
function getTask(id) { return state.tasks.find(t => t.id === id); }
function removeTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  persist();
}
function addTask(x, y) {
  const t = {
    id: uid(),
    label: "",
    x: clamp(x, 0.03, 0.97),
    y: clamp(y, 0.03, 0.97),
    done: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  state.tasks.push(t);
  persist();
  return t;
}

/* ============================================================
   Matrix pointer handling — tap to add, drag a dot to move
   ============================================================ */
function matrixCoords(clientX, clientY) {
  const r = matrix.getBoundingClientRect();
  const x = (clientX - r.left) / r.width;       // urgency
  const yTop = (clientY - r.top) / r.height;
  const y = 1 - yTop;                            // importance (flip: top = high)
  return { x: clamp(x, 0, 1), y: clamp(y, 0, 1) };
}

// Add a task by tapping empty canvas
matrix.addEventListener("pointerdown", (e) => {
  if (e.target.closest(".dot")) return;          // dot has its own handler
  if (sheet.classList.contains("visible")) return;
  const { x, y } = matrixCoords(e.clientX, e.clientY);
  const t = addTask(x, y);
  render();
  openSheet(t.id, { isNew: true });
});

// Per-dot drag using pointer capture
let drag = null; // { id, moved, pointerId }
function attachDotHandlers(el, id) {
  el.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    if (sheet.classList.contains("visible")) return;
    el.setPointerCapture(e.pointerId);
    drag = { id, moved: false, pointerId: e.pointerId, sx: e.clientX, sy: e.clientY };
    el.classList.add("dragging");
  });
  el.addEventListener("pointermove", (e) => {
    if (!drag || drag.id !== id) return;
    const dx = Math.abs(e.clientX - drag.sx), dy = Math.abs(e.clientY - drag.sy);
    if (!drag.moved && (dx > 6 || dy > 6)) drag.moved = true;
    if (drag.moved) {
      const { x, y } = matrixCoords(e.clientX, e.clientY);
      const t = getTask(id);
      if (t) { t.x = clamp(x, 0.03, 0.97); t.y = clamp(y, 0.03, 0.97); positionDot(el, t); }
    }
  });
  el.addEventListener("pointerup", (e) => {
    if (!drag || drag.id !== id) return;
    el.classList.remove("dragging");
    const moved = drag.moved;
    drag = null;
    if (moved) {
      const t = getTask(id);
      if (t) { t.updatedAt = Date.now(); persist(); }
      render();
    } else {
      openSheet(id);                 // tap = edit
    }
  });
  el.addEventListener("pointercancel", () => {
    if (drag && drag.id === id) { el.classList.remove("dragging"); drag = null; }
  });
}

/* ============================================================
   Rendering
   ============================================================ */
function positionDot(el, t) {
  el.style.left = (t.x * 100) + "%";
  el.style.top = ((1 - t.y) * 100) + "%";
  el.classList.toggle("flip-left", t.x > 0.62);  // keep labels inside the box
}

function render() {
  // dots
  matrix.querySelectorAll(".dot").forEach(d => d.remove());
  state.tasks.forEach(t => {
    const el = document.createElement("div");
    el.className = "dot" + (t.done ? " done" : "");
    el.setAttribute("role", "button");
    el.setAttribute("tabindex", "0");
    el.setAttribute("aria-label", (t.label || "Untitled task") + " — " + QUADS[quadKey(t.x, t.y)].name);
    const lbl = document.createElement("span");
    lbl.className = "dot-label";
    lbl.textContent = t.label || "…";
    el.appendChild(lbl);
    positionDot(el, t);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openSheet(t.id); }
    });
    matrix.appendChild(el);
    attachDotHandlers(el, t.id);
  });

  // count + hint
  const n = state.tasks.length;
  countEl.textContent = n;
  hint.style.display = n === 0 ? "block" : "none";

  // list (kept in sync; visible only when its tab is active)
  renderList();
}

function renderList() {
  const order = ["do", "plan", "delegate", "drop"];
  const groups = { do: [], plan: [], delegate: [], drop: [] };
  state.tasks.forEach(t => groups[quadKey(t.x, t.y)].push(t));

  if (state.tasks.length === 0) {
    listScroll.innerHTML = '<div class="empty">No tasks yet.<br>Switch to Matrix and tap to drop one.</div>';
    return;
  }

  let html = "";
  order.forEach(key => {
    const items = groups[key];
    if (!items.length) return;
    // active first, then done; newest-updated first within each
    items.sort((a, b) => (a.done - b.done) || (b.updatedAt - a.updatedAt));
    const q = QUADS[key];
    html += '<div class="group-head"><span class="swatch"></span>'
          + '<h3>' + q.name + '</h3><span>' + q.desc + '</span></div>';
    items.forEach(t => {
      html += '<button class="row ' + (t.done ? "done" : "") + '" data-id="' + t.id + '">'
            + '<span class="marker"></span>'
            + '<span class="row-label">' + escapeHtml(t.label || "Untitled task") + '</span>'
            + '<span class="row-meta">' + q.name + '</span></button>';
    });
  });
  listScroll.innerHTML = html;
  listScroll.querySelectorAll(".row").forEach(row => {
    row.addEventListener("click", () => {
      showMatrixView();          // jump to canvas so edits are visible in context
      openSheet(row.dataset.id);
    });
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ============================================================
   View toggle
   ============================================================ */
function showMatrixView() {
  listView.classList.remove("show");
  listView.setAttribute("aria-hidden", "true");
  tabMatrix.classList.add("active"); tabMatrix.setAttribute("aria-selected", "true");
  tabList.classList.remove("active"); tabList.setAttribute("aria-selected", "false");
}
function showListView() {
  renderList();
  listView.classList.add("show");
  listView.setAttribute("aria-hidden", "false");
  tabList.classList.add("active"); tabList.setAttribute("aria-selected", "true");
  tabMatrix.classList.remove("active"); tabMatrix.setAttribute("aria-selected", "false");
}
tabMatrix.addEventListener("click", showMatrixView);
tabList.addEventListener("click", showListView);

/* ============================================================
   Boot
   ============================================================ */
render();

if (Store.backend === "memory") {
  // honest, in-the-interface notice — not a mood, just direction
  hint.textContent = "preview mode · data won't be saved here · open or serve the file to persist";
}

/* Service worker — only where it can actually register */
if ("serviceWorker" in navigator) {
  const ok = location.protocol === "https:" ||
             ["localhost", "127.0.0.1"].includes(location.hostname);
  if (ok) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
}
</script>
</body>
</html>
